version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      AllDeps:
        patterns:
          - "*"
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope

  - package-ecosystem: nuget
    directory: /example/AppHost
    schedule:
      interval: daily

  - package-ecosystem: nuget
    directory: /example/ServiceDefaults
    schedule:
      interval: daily

  - package-ecosystem: nuget
    directory: /example/WorkerService
    schedule:
      interval: daily

  - package-ecosystem: nuget
    directory: /src/AlbusKavaliro.TraceableLdapClient
    schedule:
      interval: daily

  - package-ecosystem: nuget
    directory: /tests/AlbusKavaliro.TraceableLdapClient.Tests
    schedule:
      interval: daily
