name: DevGuard DevSecOps

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  call-devsecops:
    uses: l3montree-dev/devguard-action/.github/workflows/full.yml@main
    with:
      asset-name: "albuskavaliro/projects/traceableldapclient/assets/traceableldapclient"
      api-url: "https://api.devguard.org"
      web-ui: "https://app.devguard.org"
    secrets:
      devguard-token: "${{ secrets.DEVGUARD_TOKEN }}"
